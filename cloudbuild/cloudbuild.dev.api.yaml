# Cloud Build — dev API image (Mitene FastAPI backend)
# Submit from mitene repository root:
#   gcloud builds submit --config=cloudbuild/cloudbuild.dev.api.yaml .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mitene-api:${_TAG} || true
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mitene-api:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mitene-api:${_TAG} \
          .
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mitene-api:${_TAG}'

substitutions:
  _REGION: asia-northeast1
  _REPO: mitene-docker
  _TAG: dev

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
