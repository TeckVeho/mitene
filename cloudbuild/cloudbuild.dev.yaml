# Cloud Build — dev images (API + web) → Artifact Registry
#
# Registry vs deploy (four-project layout): images push to project _AR_PROJECT_ID (common);
# Cloud Run deploy targets _DEPLOY_PROJECT_ID (dev app).
# GitHub Actions resolves empty fallback to $PROJECT_ID before calling gcloud builds submit,
# so _AR_PROJECT_ID and _DEPLOY_PROJECT_ID are always non-empty when submitted via CI.
#
# Submit from repo root:
#   gcloud builds submit --config=cloudbuild/cloudbuild.dev.yaml \
#     --substitutions=_AR_PROJECT_ID=your-common-project,_DEPLOY_PROJECT_ID=your-dev-project .
# Faster backend-only: cloudbuild/cloudbuild.dev.api.yaml
# Web image only: cloudbuild/cloudbuild.dev.web.yaml

steps:
  # Pull previous image when present so Docker can reuse layers (--cache-from).
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} || true
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} \
          .
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG}'

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} || true
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL} \
          --build-arg NEXT_PUBLIC_BASE_URL=${_NEXT_PUBLIC_BASE_URL} \
          --build-arg NEXT_PUBLIC_STORAGE_BACKEND=${_NEXT_PUBLIC_STORAGE_BACKEND} \
          --cache-from ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} \
          .
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mitene-api-dev'
      - '--project'
      - '${_DEPLOY_PROJECT_ID}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--no-allow-unauthenticated'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mitene-web-dev'
      - '--project'
      - '${_DEPLOY_PROJECT_ID}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: asia-northeast1
  _REPO: mitene-docker
  _TAG: dev
  _AR_PROJECT_ID: ''
  _DEPLOY_PROJECT_ID: ''
  _NEXT_PUBLIC_API_URL: 'https://mitene-api-dev-739321310569.asia-northeast1.run.app/api'
  _NEXT_PUBLIC_BASE_URL: 'https://mitene-web-dev-739321310569.asia-northeast1.run.app'
  _NEXT_PUBLIC_STORAGE_BACKEND: 'gcs'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
