# Cloud Build — production API only
#
# Builds+pushes mitene-api image, then deploys mitene-api-prod Cloud Run service.
#
# Always pass _AR_PROJECT_ID (Artifact Registry project) and _DEPLOY_PROJECT_ID
# (Cloud Run target project) when using shared registry / cross-project deploy.
#   gcloud builds submit --config=cloudbuild/cloudbuild.prod.api.yaml \
#     --substitutions=_AR_PROJECT_ID=your-common-project,_DEPLOY_PROJECT_ID=your-prod-project .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} || true
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG} \
          .
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mitene-api-prod'
      - '--project'
      - '${_DEPLOY_PROJECT_ID}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-api:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: asia-northeast1
  _REPO: mitene-docker
  _TAG: prod
  _AR_PROJECT_ID: ''
  _DEPLOY_PROJECT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
