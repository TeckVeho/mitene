# Cloud Build — dev web only (faster when backend unchanged)
#
# Builds+pushes mitene-web image, then deploys mitene-web-dev Cloud Run service.
#
# Always pass _AR_PROJECT_ID (Artifact Registry project), _DEPLOY_PROJECT_ID
# (Cloud Run target project), and _NEXT_PUBLIC_* when using shared registry / cross-project deploy.
# Submit from repo root:
#   gcloud builds submit --config=cloudbuild/cloudbuild.dev.web.yaml \
#     --substitutions=_AR_PROJECT_ID=your-common-project,_DEPLOY_PROJECT_ID=your-dev-project,_NEXT_PUBLIC_API_URL=https://YOUR-API/api,_NEXT_PUBLIC_BASE_URL=https://YOUR-WEB,_NEXT_PUBLIC_STORAGE_BACKEND=gcs .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} || true
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL} \
          --build-arg NEXT_PUBLIC_BASE_URL=${_NEXT_PUBLIC_BASE_URL} \
          --build-arg NEXT_PUBLIC_STORAGE_BACKEND=${_NEXT_PUBLIC_STORAGE_BACKEND} \
          --cache-from ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG} \
          .
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mitene-web-dev'
      - '--project'
      - '${_DEPLOY_PROJECT_ID}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_AR_PROJECT_ID}/${_REPO}/mitene-web:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: asia-northeast1
  _REPO: mitene-docker
  _TAG: dev
  _AR_PROJECT_ID: ''
  _DEPLOY_PROJECT_ID: ''
  _NEXT_PUBLIC_API_URL: 'https://mitene-api-dev-739321310569.asia-northeast1.run.app/api'
  _NEXT_PUBLIC_BASE_URL: 'https://mitene-web-dev-739321310569.asia-northeast1.run.app'
  _NEXT_PUBLIC_STORAGE_BACKEND: 'gcs'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
