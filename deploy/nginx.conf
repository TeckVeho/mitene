# NoteVideo Nginx 設定
# /etc/nginx/sites-available/notevideo に配置し、
# /etc/nginx/sites-enabled/notevideo にシンボリックリンクを作成する。
#
# 事前に Let's Encrypt SSL 証明書を取得しておくこと:
#   sudo certbot --nginx -d {ドメイン名}

server {
    listen 80;
    server_name _;
    # HTTP → HTTPS リダイレクト
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name {ドメイン名};  # 実際のドメインに置き換える

    ssl_certificate     /etc/letsencrypt/live/{ドメイン名}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{ドメイン名}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ファイルアップロードサイズ上限（CSVファイルに合わせて調整）
    client_max_body_size 50M;

    # バックエンド API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 動画生成の長時間処理に対応（最大30分）
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # フロントエンド（Next.js）
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
