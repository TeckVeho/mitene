name: Setup SSH
description: Setup SSH agent and known hosts

inputs:
  ssh_key:
    description: Private SSH key used by ssh-agent
    required: true
  host:
    description: SSH host name or IP for known_hosts
    required: true

runs:
  using: composite
  steps:
    - uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh_key }}

    - shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
      run: |
        set -euo pipefail

        if [ -z "${SSH_HOST:-}" ]; then
          exit 1
        fi

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        if ssh-keygen -F "$SSH_HOST" > /dev/null 2>&1; then
          exit 0
        fi

        for attempt in 1 2 3; do
          if ssh-keyscan -T 10 -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            exit 0
          fi
          sleep 2
        done

        exit 1
